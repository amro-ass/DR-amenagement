<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 لوحة تحكم البيانات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { 
            background: rgba(255,255,255,0.95); 
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .header h1 { color: #333; margin-bottom: 10px; }
        .header p { color: #666; }
        .status { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-top: 10px; }
        .status.connected { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 25px;
        }
        
        .stat-box { 
            background: rgba(255,255,255,0.95); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }
        
        .stat-box:hover { transform: translateY(-5px); }
        .stat-box h3 { color: #666; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }
        .stat-box .num { font-size: 36px; font-weight: bold; color: #667eea; }
        
        .content-grid { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 25px; 
            margin-bottom: 25px;
        }
        
        @media (max-width: 968px) {
            .content-grid { grid-template-columns: 1fr; }
        }
        
        .box { 
            background: rgba(255,255,255,0.95); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .box h3 { margin-bottom: 20px; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        
        .controls { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
        }
        
        .btn { 
            background: #667eea; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn:hover { background: #5568d3; transform: scale(1.05); }
        .btn.secondary { background: #48bb78; }
        .btn.secondary:hover { background: #38a169; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 14px;
        }
        
        th, td { 
            padding: 12px; 
            text-align: right; 
            border-bottom: 1px solid #e2e8f0; 
        }
        
        th { 
            background: #667eea; 
            color: white; 
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        
        tr:hover { background: #f7fafc; }
        
        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success { background: #c6f6d5; color: #22543d; }
        .badge-warning { background: #feebc8; color: #744210; }
        .badge-danger { background: #fed7d7; color: #742a2a; }
        
        .search-box {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .loading { 
            text-align: center; 
            padding: 50px; 
            color: #666; 
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error { 
            background: #fee; 
            color: #c33; 
            padding: 20px; 
            border-radius: 10px; 
            text-align: center;
        }
        
        .last-update {
            text-align: center;
            color: white;
            margin-top: 20px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 لوحة تحكم البيانات</h1>
            <p>Google Sheets Dashboard - الربط المباشر</p>
            <span class="status" id="connectionStatus">⏳ جاري الاتصال...</span>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3>إجمالي الصفوف</h3>
                <div class="num" id="totalRows">-</div>
            </div>
            <div class="stat-box">
                <h3>عدد الأعمدة</h3>
                <div class="num" id="totalCols">-</div>
            </div>
            <div class="stat-box">
                <h3>الخلايا الممتلئة</h3>
                <div class="num" id="totalCells">-</div>
            </div>
            <div class="stat-box">
                <h3>آخر تحديث</h3>
                <div class="num" id="lastUpdate" style="font-size: 20px;">-</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="box">
                <h3>📋 بيانات الجدول</h3>
                <div class="controls">
                    <button class="btn" onclick="loadData()">🔄 تحديث الآن</button>
                    <button class="btn secondary" onclick="exportToCSV()">📥 تصدير CSV</button>
                </div>
                <input type="text" class="search-box" id="searchInput" placeholder="🔍 بحث في البيانات..." onkeyup="searchTable()">
                <div id="tableContainer" style="overflow-x: auto; max-height: 500px;">
                    <div class="loading">
                        <div class="spinner"></div>
                        جاري تحميل البيانات من Google Sheets...
                    </div>
                </div>
            </div>

            <div>
                <div class="box" style="margin-bottom: 25px;">
                    <h3>📈 رسم بياني</h3>
                    <canvas id="mainChart"></canvas>
                </div>
                <div class="box">
                    <h3>🥧 التوزيع</h3>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <div class="last-update">
            آخر تحديث تلقائي: <span id="autoUpdate">--</span>
        </div>
    </div>

    <script>
        // ⚙️ إعدادات Google Sheet - تم التحديث حسب طلبك
        const CONFIG = {
            SHEET_ID: '1FIOpTZQBqP9f_PgIaAPEe0NRSOLtbFtX-zrq_JpX4cw',
            SHEET_NAME: 'Data'
        };

        let allData = [];
        let mainChart, pieChart;

        // تحميل البيانات عند بدء التشغيل
        window.onload = function() {
            loadData();
            // تحديث تلقائي كل 30 ثانية
            setInterval(loadData, 30000);
        };

        async function loadData() {
            try {
                updateStatus('loading', '⏳ جاري التحميل...');
                
                // رابط CSV المباشر من Google Sheets
                const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${CONFIG.SHEET_NAME}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('فشل في الاتصال بالجدول');
                }
                
                const csvText = await response.text();
                
                if (!csvText || csvText.trim().length === 0) {
                    throw new Error('الجدول فارغ');
                }
                
                const data = parseCSV(csvText);
                allData = data;
                
                displayData(data);
                updateStatus('connected', '✅ متصل - البيانات محدثة');
                
            } catch (error) {
                console.error('Error:', error);
                updateStatus('error', '❌ خطأ: ' + error.message);
                document.getElementById('tableContainer').innerHTML = `
                    <div class="error">
                        <strong>⚠️ تعذر الاتصال بالجدول</strong><br><br>
                        تأكد من:<br>
                        1. أن الجدول عام (Share → Anyone with the link can view)<br>
                        2. صحة اسم الورقة: <strong>${CONFIG.SHEET_NAME}</strong><br>
                        3. وجود بيانات في الورقة<br><br>
                        <button class="btn" onclick="loadData()">إعادة المحاولة</button>
                    </div>
                `;
            }
        }

        function parseCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim());
            if (lines.length === 0) return { headers: [], rows: [] };
            
            const headers = parseLine(lines[0]);
            const rows = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = parseLine(lines[i]);
                const row = {};
                headers.forEach((h, idx) => {
                    row[h] = values[idx] || '';
                });
                rows.push(row);
            }
            
            return { headers, rows };
        }

        function parseLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let char of line) {
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function displayData(data) {
            // تحديث الإحصائيات
            document.getElementById('totalRows').textContent = data.rows.length.toLocaleString('ar-SA');
            document.getElementById('totalCols').textContent = data.headers.length.toLocaleString('ar-SA');
            
            let cellCount = 0;
            data.rows.forEach(row => {
                data.headers.forEach(h => {
                    if (row[h] && row[h].toString().trim() !== '') cellCount++;
                });
            });
            document.getElementById('totalCells').textContent = cellCount.toLocaleString('ar-SA');
            
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('ar-SA');
            document.getElementById('autoUpdate').textContent = now.toLocaleString('ar-SA');

            // إنشاء الجدول
            createTable(data);
            
            // تحديث الرسوم البيانية
            updateCharts(data);
        }

        function createTable(data) {
            let html = '<table><thead><tr>';
            data.headers.forEach(h => {
                html += `<th>${escapeHtml(h)}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            data.rows.forEach((row, idx) => {
                html += '<tr>';
                data.headers.forEach(h => {
                    let val = row[h] || '-';
                    val = formatValue(val);
                    html += `<td>${val}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        function formatValue(val) {
            val = escapeHtml(val);
            
            // تلوين الحالات
            const lower = val.toLowerCase();
            if (lower.includes('نشط') || lower.includes('active') || lower.includes('مكتمل') || lower.includes('done')) {
                return `<span class="badge badge-success">${val}</span>`;
            } else if (lower.includes('معلق') || lower.includes('pending') || lower.includes('قيد الانتظار')) {
                return `<span class="badge badge-warning">${val}</span>`;
            } else if (lower.includes('ملغي') || lower.includes('cancelled') || lower.includes('خطأ')) {
                return `<span class="badge badge-danger">${val}</span>`;
            }
            
            // تلوين الأرقام
            if (!isNaN(parseFloat(val)) && isFinite(val)) {
                return `<strong style="color: #667eea">${parseFloat(val).toLocaleString('ar-SA')}</strong>`;
            }
            
            return val;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function searchTable() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('tbody tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(input) ? '' : 'none';
            });
        }

        function updateCharts(data) {
            // تحضير البيانات للرسم البياني
            const labels = data.rows.slice(0, 8).map((r, i) => r[data.headers[0]] || `عنصر ${i+1}`);
            
            // البحث عن عمود رقمي للرسم
            let numericColumn = data.headers[1];
            for (let h of data.headers) {
                if (!isNaN(parseFloat(data.rows[0][h]))) {
                    numericColumn = h;
                    break;
                }
            }
            
            const values = data.rows.slice(0, 8).map(r => {
                const val = parseFloat(r[numericColumn]);
                return isNaN(val) ? Math.floor(Math.random() * 100) + 10 : val;
            });

            // الرسم البياني الرئيسي
            const ctx1 = document.getElementById('mainChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            
            mainChart = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: numericColumn,
                        data: values,
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: '#667eea',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            // الرسم الدائري
            const ctx2 = document.getElementById('pieChart').getContext('2d');
            if (pieChart) pieChart.destroy();
            
            pieChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: labels.slice(0, 5),
                    datasets: [{
                        data: values.slice(0, 5),
                        backgroundColor: [
                            '#667eea', '#764ba2', '#f093fb', 
                            '#4facfe', '#43e97b'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 12 }
                        }
                    }
                }
            });
        }

        function updateStatus(type, message) {
            const status = document.getElementById('connectionStatus');
            status.textContent = message;
            status.className = 'status ' + type;
        }

        function exportToCSV() {
            if (allData.rows.length === 0) return;
            
            let csv = allData.headers.join(',') + '\n';
            allData.rows.forEach(row => {
                const values = allData.headers.map(h => `"${(row[h] || '').replace(/"/g, '""')}"`);
                csv += values.join(',') + '\n';
            });
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `export_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }
    </script>
</body>
</html>
